<footer style="margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--glass-border); text-align: center; color: var(--text-secondary);">
  <div style="display: flex; gap: 1.5rem; justify-content: center; margin-bottom: 1rem;">
    <a href="https://twitter.com/{{ site.author.twitter }}" target="_blank" style="color: var(--text-secondary); font-size: 1.5rem;"><i class="fa-brands fa-twitter"></i></a>
    <a href="https://github.com/{{ site.author.github }}" target="_blank" style="color: var(--text-secondary); font-size: 1.5rem;"><i class="fa-brands fa-github"></i></a>
    <a href="mailto:{{ site.author.email }}" style="color: var(--text-secondary); font-size: 1.5rem;"><i class="fa-solid fa-envelope"></i></a>
  </div>
  <p style="font-size: 0.9rem;">&copy; {{ site.time | date: '%Y' }} Shahidh Muhammed. All rights reserved.</p>
</footer>
